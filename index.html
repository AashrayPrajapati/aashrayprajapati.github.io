<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>HTML Product Grid View</title>
        <meta content="width=device-width, initial-scale=1.0" name="viewport">
        <meta content="" name="keywords">
        <meta content="" name="description">

        <!-- Favicons -->
        <link href="img/favicon.ico" rel="icon">
        <link href="img/apple-touch-icon.png" rel="apple-touch-icon">
        
        <!-- Google Font -->
        <link href="https://fonts.googleapis.com/css?family=Raleway:200,300,400,500,600,700,800&display=swap" rel="stylesheet"> 

        <!-- Font Awesome Icons -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

        <!-- Main Stylesheet File -->
        <link href="style.css" rel="stylesheet">
    </head>

    <body>
        <!-- Grid Style 1 Start -->
        <div class="grid-title">
            <h2>Products Page</h2>
        </div>
        <div class="grid-title">
            <!-- <h2>Product Grid Style 4</h2> -->
            <hr>
        </div>
        <div class="product-grid grid-4">
            <div class="product-item">
                <div class="product-single">
                    <div class="product-img">
                        <!-- <img src="img/product-3.jpg" alt="Product Image"/> -->
                        <img src="https://images.unsplash.com/photo-1511499767150-a48a237f0083?ixlib=rb-1.2.1&ixid=MnwxMjA3fDB8MHxzZWFyY2h8MTMxfHxwcm9kdWN0c3xlbnwwfDJ8MHx8&auto=format&fit=crop&w=500&q=60" alt="Sunglasses">
                        <div class="product-status">
                            <span>New</span>
                            <span>Sale</span>
                        </div>
                        <div class="product-price">$100</div>
                        <div class="product-action">
                            <a href=""><i class="fa fa-shopping-bag"></i> Add to Wishlist</a>
                            <a href=""><i class="fa fa-shopping-cart"></i> Add to Cart</a>
                        </div>
                    </div>
                    <div class="product-content">
                        <div class="product-title">
                            <h2><a href="">Product Title</a></h2>
                        </div>
                        <div class="product-ratting">
                            <i class="fa fa-star"></i>
                            <i class="fa fa-star"></i>
                            <i class="fa fa-star"></i>
                            <i class="fa fa-star"></i>
                            <i class="fa fa-star-o"></i>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="product-item">

                            <span>New</span>

                            <i class="fa fa-star"></i>
                            <i class="fa fa-star-half-o"></i>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="product-item">
                <div class="product-single">
                    <div class="product-img">
                        <!-- <img src="img/product-7.jpg" alt="Product Image"/> -->
                        <img src="https://images.unsplash.com/photo-1604364184152-f3bd80470c45?ixlib=rb-1.2.1&ixid=MnwxMjA3fDB8MHxzZWFyY2h8MTQ5fHxwcm9kdWN0c3xlbnwwfDJ8MHx8&auto=format&fit=crop&w=500&q=60" alt="i-Phone">
